<style>
  /* Self-hosted fonts (fonts/, root-absolute so they resolve at /card too) —
     no third-party Google Fonts request. Mirrors index.html's @font-face set. */
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400 500;
    font-display: swap; src: url('/fonts/cormorant-garamond.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400;
    font-display: swap; src: url('/fonts/cormorant-garamond-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter'; font-style: normal; font-weight: 300 500;
    font-display: swap; src: url('/fonts/inter.woff2') format('woff2');
  }
  :root {
    --ink: #2A2218;
    --gold: #B89968;
    --limestone: #EDE7D9;
    --slate: #5A4F3E;
    --line: #E5DDD0;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--limestone);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--limestone);
    border: 1px solid var(--line);
    padding: 40px 28px 32px;
    text-align: center;
    box-shadow:
      0 1px 3px rgba(42, 34, 24, 0.04),
      0 12px 36px rgba(42, 34, 24, 0.08);
    position: relative;
  }

  /* Top gold accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: var(--gold);
  }

  .name {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.005em;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .role {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--slate);
    margin-bottom: 18px;
  }

  .rule {
    width: 50px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 24px;
  }

  .studio-mark {
    display: inline-block;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--gold);
    margin-bottom: 8px;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
  }
  .studio-mark:hover, .studio-mark:focus-visible { border-color: var(--gold); outline: none; }

  .pitch {
    font-family: var(--serif);
    font-size: 19px;
    font-style: italic;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 32px;
    padding: 0 8px;
  }

  /* CTA — primary tap target */
  .cta {
    display: block;
    width: 100%;
    background: var(--ink);
    color: var(--limestone);
    text-decoration: none;
    padding: 18px 24px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    text-align: center;
    margin-bottom: 12px;
    transition: background 0.25s ease, transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:active { transform: scale(0.98); background: var(--gold); }
  @media (hover: hover) {
    .cta:hover { background: var(--gold); }
  }

  .cta-secondary {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 24px;
    border: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 12px;
    transition: border-color 0.25s ease, color 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-secondary:active { border-color: var(--gold); color: var(--gold); }
  @media (hover: hover) {
    .cta-secondary:hover { border-color: var(--gold); color: var(--gold); }
  }

  /* Direct contact links */
  .quick-contact {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quick-contact a {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--slate);
    text-decoration: none;
    padding: 6px 0;
    transition: color 0.2s ease;
  }
  .quick-contact a:active,
  .quick-contact a:hover { color: var(--gold); }

  .quick-contact .label {
    font-family: var(--sans);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--gold);
    margin-right: 8px;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 32px;
    font-family: var(--sans);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--slate);
  }
  footer .dot { color: var(--gold); margin: 0 6px; }
  footer a { color: var(--slate); text-decoration: none; transition: color 0.2s ease; }
  footer a:hover, footer a:focus-visible { color: var(--gold); }
  /* Instagram glyph (2026-07-21) — drawn inline, no icon font/dep. Gold at
     rest, a subtle brightness lift on hover/focus. */
  .ig-icon { display: inline-block; width: 20px; height: 20px; vertical-align: -5px; margin-right: 6px; color: var(--gold); transition: filter 0.2s ease; }
  footer a:hover .ig-icon, footer a:focus-visible .ig-icon { filter: brightness(1.35); }

  /* Subtle entrance animation */
  .card {
    animation: rise 0.6s cubic-bezier(0.2, 0.7, 0.3, 1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
