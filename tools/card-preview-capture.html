<!doctype html>
<!-- tools/card-preview-capture.html — dev-only capture page for card-preview.png
     (the og:image/twitter:image used by card.html, start.html, contact.html,
     and atelier.html). NOT part of the shipped site (tools/ is excluded from
     both Jekyll and promote.sh). Reuses card.html's own markup/CSS verbatim —
     this is a static composition (no WebGL engine involved), so unlike
     og-image-capture.html there's no boot sequence to wait on, just a fixed
     1200x630 frame with the card centered. Captured by
     tools/capture-card-preview.mjs. -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 8 8'%3E%3Crect width='8' height='8' fill='%23211B12'/%3E%3C/svg%3E">
<style>
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400 500;
    font-display: block; src: url('../fonts/cormorant-garamond.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400;
    font-display: block; src: url('../fonts/cormorant-garamond-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter'; font-style: normal; font-weight: 300 500;
    font-display: block; src: url('../fonts/inter.woff2') format('woff2');
  }
  :root {
    --ink: #2A2218;
    --gold: #B89968;
    --limestone: #EDE7D9;
    --slate: #5A4F3E;
    --line: #E5DDD0;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1200px; height: 630px; overflow: hidden;
    background: var(--limestone);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.5;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 420px;
    background: var(--limestone);
    border: 1px solid var(--line);
    padding: 40px 28px 32px;
    text-align: center;
    box-shadow:
      0 1px 3px rgba(42, 34, 24, 0.04),
      0 12px 36px rgba(42, 34, 24, 0.08);
    position: relative;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: var(--gold);
  }
  .name {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 500;
    letter-spacing: 0.005em;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .role {
    font-family: var(--serif);
    font-style: italic;
    font-size: 16px;
    color: var(--slate);
    margin-bottom: 18px;
  }
  .rule {
    width: 50px;
    height: 1px;
    background: var(--gold);
    margin: 0 auto 24px;
  }
  .studio-mark {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .pitch {
    font-family: var(--serif);
    font-size: 19px;
    font-style: italic;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 32px;
    padding: 0 8px;
  }
  .cta {
    display: block;
    width: 100%;
    background: var(--ink);
    color: var(--limestone);
    text-decoration: none;
    padding: 18px 24px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    text-align: center;
    margin-bottom: 12px;
  }
  .cta-secondary {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 24px;
    border: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    text-align: center;
    margin-bottom: 12px;
  }
  .quick-contact {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .quick-contact a {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--slate);
    text-decoration: none;
    padding: 6px 0;
  }
  .quick-contact .label {
    font-family: var(--sans);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--gold);
    margin-right: 8px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="name">Laurence A. Rugley</div>
  <div class="role">Web Developer</div>
  <div class="rule"></div>

  <div class="studio-mark">LGR Web Studios</div>
  <p class="pitch">Custom websites for product brands and service businesses. A digital atelier in Pasadena.</p>

  <a class="cta">Start a Project</a>
  <a class="cta-secondary">View Recent Work</a>

  <div class="quick-contact">
    <a><span class="label">Call</span>(909) 753-2601</a>
    <a><span class="label">Text</span>(909) 753-2601</a>
    <a><span class="label">Email</span>lrugley@gmail.com</a>
  </div>
</div>
</body>
</html>
