<style>
  /* Self-hosted fonts (fonts/, root-absolute so they resolve at /contact too) —
     no third-party Google Fonts request. Mirrors card.html's @font-face set. */
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: normal; font-weight: 400 500;
    font-display: swap; src: url('/fonts/cormorant-garamond.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Cormorant Garamond'; font-style: italic; font-weight: 400;
    font-display: swap; src: url('/fonts/cormorant-garamond-italic.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Inter'; font-style: normal; font-weight: 300 500;
    font-display: swap; src: url('/fonts/inter.woff2') format('woff2');
  }
  :root {
    --ink: #2A2218;
    --gold: #B89968;
    --limestone: #EDE7D9;
    --slate: #5A4F3E;
    --line: #E5DDD0;
    --serif: 'Cormorant Garamond', serif;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--limestone);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 300;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
    background: var(--limestone);
    border: 1px solid var(--line);
    padding: 40px 28px 32px;
    text-align: center;
    box-shadow:
      0 1px 3px rgba(42, 34, 24, 0.04),
      0 12px 36px rgba(42, 34, 24, 0.08);
    position: relative;
    animation: rise 0.6s cubic-bezier(0.2, 0.7, 0.3, 1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Top gold accent line */
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: var(--gold);
  }

  .studio-mark {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    color: var(--gold);
    margin-bottom: 18px;
  }

  .h1 {
    font-family: var(--serif);
    font-size: 30px;
    font-weight: 500;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  .lead {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--slate);
    margin-bottom: 32px;
    padding: 0 4px;
  }

  /* CTA — primary tap target */
  .cta {
    display: block;
    width: 100%;
    background: var(--ink);
    color: var(--limestone);
    text-decoration: none;
    padding: 18px 24px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.32em;
    text-align: center;
    margin-bottom: 16px;
    transition: background 0.25s ease, transform 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:active { transform: scale(0.98); background: var(--gold); }
  @media (hover: hover) {
    .cta:hover { background: var(--gold); }
  }

  /* Plain selectable email — IG's in-app webview can swallow mailto: taps,
     so the address also has to exist as ordinary copyable text, not just
     inside a link. user-select: all makes one tap/click select the whole
     address instead of a single word. */
  .mail-plain {
    font-family: var(--sans);
    font-size: 13px;
    color: var(--ink);
    background: #fff;
    border: 1px solid var(--line);
    padding: 10px 14px;
    margin-bottom: 24px;
    user-select: all;
    -webkit-user-select: all;
    word-break: break-all;
  }
  .mail-plain-label {
    display: block;
    font-family: var(--sans);
    font-size: 9px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--slate);
    margin-bottom: 20px;
  }

  .cta-secondary {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--ink);
    text-decoration: none;
    padding: 14px 24px;
    border: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    text-align: center;
    transition: border-color 0.25s ease, color 0.25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-secondary:active { border-color: var(--gold); color: var(--gold); }
  /* Instagram glyph (2026-07-21) — same treatment as the footer instances
     elsewhere on the site: drawn inline, no icon font/dep, gold at rest
     (independent of the button text's own ink->gold hover transition),
     brightness-lift rather than a hue change on hover/focus since it's
     already gold. */
  .ig-icon { display: inline-block; width: 20px; height: 20px; vertical-align: -5px; margin-right: 6px; color: var(--gold); transition: filter 0.2s ease; }
  .cta-secondary:hover .ig-icon, .cta-secondary:active .ig-icon { filter: brightness(1.35); }
  @media (hover: hover) {
    .cta-secondary:hover { border-color: var(--gold); color: var(--gold); }
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 32px;
    font-family: var(--sans);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.28em;
    color: var(--slate);
  }
  footer .dot { color: var(--gold); margin: 0 6px; }
  footer a { color: var(--slate); text-decoration: none; }
  footer a:hover, footer a:active { color: var(--gold); }
</style>
</head>
<body>

<div class="card">
  <div class="studio-mark">LGR Web Studios</div>

  <h1 class="h1">Book a free 15-min consult</h1>
  <p class="lead">We'll look at your current site together and tell you exactly what we'd change — no pitch, no obligation.</p>

  <a class="cta" href="mailto:hello@lgrwebstudios.com?subject=Free%2015-min%20consult">Email us</a>

  <span class="mail-plain-label">Or copy the address directly</span>
  <p class="mail-plain">hello@lgrwebstudios.com</p>

</div>

<footer>
  LGR Web Studios
  <span class="dot">·</span>
  Pasadena, CA
  <span class="dot">·</span>
  <a href="/atelier">How we build</a>
</footer>

</body>
